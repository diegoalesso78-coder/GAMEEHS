<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>MEMORY PREVENTIVO - SAFETY OPERATOR</title>
    
    <!-- CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        safety: {
                            orange: "#FF6B00",
                            yellow: "#FFD700",
                            blue: "#0054A6",
                            red: "#D71920",
                            green: "#008A44",
                            black: "#050505",
                            gray: "#121212",
                            accent: "#FFB300"
                        }
                    },
                    fontFamily: {
                        display: ["Space Grotesk", "sans-serif"],
                        sans: ["Inter", "sans-serif"],
                        mono: ["JetBrains Mono", "monospace"]
                    }
                }
            }
        }
    </script>

    <style type="text/css">
        @layer base {
            body {
                @apply bg-safety-black text-slate-200 font-sans selection:bg-safety-orange selection:text-white overflow-hidden;
            }
        }

        .industrial-grid {
            background-image: 
                linear-gradient(rgba(255, 107, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 107, 0, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .hazard-stripes {
            background: repeating-linear-gradient(
                45deg,
                #FFD700,
                #FFD700 12px,
                #000 12px,
                #000 24px
            );
        }

        .glass-panel {
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .card-perspective {
            perspective: 1500px;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card-flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.05);
        }

        .card-back {
            transform: rotateY(180deg);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #FF6B00;
            border-radius: 10px;
        }

        @keyframes match-success {
            0% { transform: scale(1); border-color: rgba(255,255,255,0.1); }
            50% { transform: scale(1.05); border-color: #008A44; box-shadow: 0 0 30px rgba(0,138,68,0.4); }
            100% { transform: scale(1); border-color: #008A44; }
        }

        .matched-card {
            animation: match-success 0.6s ease-out forwards;
        }
    </style>
</head>
<body class="industrial-grid min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        const SHEETS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT-1bcf0ugEXafqimV7jTMtEpZ0U1TH2zGy0EMt_R_Pc3qnShewR4ogYy3vvX8MeAiMlNNej6FsIYa3/pub?gid=1346735467&single=true&output=csv';

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [view, setView] = useState('INTRO');
            const [players, setPlayers] = useState([{ id: 1, name: '', score: 0 }]);
            const [difficulty, setDifficulty] = useState(6);
            const [cards, setCards] = useState([]);
            const [flipped, setFlipped] = useState([]);
            const [matched, setMatched] = useState([]);
            const [currentPlayer, setCurrentPlayer] = useState(0);
            const [isProcessing, setIsProcessing] = useState(false);
            const [gameData, setGameData] = useState([]);
            const [matchInfo, setMatchInfo] = useState(null);
            const [loading, setLoading] = useState(true);

            // Robust CSV Parsing
            useEffect(() => {
                const fetchData = async () => {
                    try {
                        const response = await fetch(SHEETS_URL);
                        const csvText = await response.text();
                        const rows = csvText.split('\n').slice(1);
                        
                        const parsed = rows.map(row => {
                            // Regex para manejar comas dentro de comillas
                            const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/^"|"$/g, ''));
                            return {
                                emoji: cols[0],
                                descripcion: cols[1],
                                tipo: cols[2],
                                color: cols[3],
                                norma: cols[4],
                                desc_larga: cols[5]
                            };
                        }).filter(item => item.emoji && item.descripcion);

                        setGameData(parsed);
                        setLoading(false);
                    } catch (error) {
                        console.error("Error loading sheets:", error);
                        setLoading(false);
                    }
                };
                fetchData();
            }, []);

            const startGame = () => {
                const validPlayers = players.filter(p => p.name.trim() !== '');
                if (validPlayers.length === 0) {
                    alert("Ingrese al menos un operador.");
                    return;
                }
                
                setPlayers(validPlayers.map(p => ({ ...p, score: 0 })));
                setCurrentPlayer(0);
                
                const selected = [...gameData].sort(() => Math.random() - 0.5).slice(0, difficulty);
                const deck = [];
                
                selected.forEach((item, idx) => {
                    // Carta Visual (Emoji)
                    deck.push({
                        id: `v-${idx}`,
                        pairId: idx,
                        type: 'visual',
                        content: item.emoji,
                        item: item
                    });
                    // Carta de Texto (Descripción + Norma)
                    deck.push({
                        id: `t-${idx}`,
                        pairId: idx,
                        type: 'text',
                        content: item.descripcion,
                        item: item
                    });
                });

                setCards(deck.sort(() => Math.random() - 0.5));
                setMatched([]);
                setFlipped([]);
                setView('GAME');
            };

            const handleCardClick = (idx) => {
                if (isProcessing || flipped.includes(idx) || matched.includes(idx)) return;

                const newFlipped = [...flipped, idx];
                setFlipped(newFlipped);

                if (newFlipped.length === 2) {
                    setIsProcessing(true);
                    const [f, s] = newFlipped;
                    
                    if (cards[f].pairId === cards[s].pairId) {
                        setTimeout(() => {
                            setMatched(prev => [...prev, f, s]);
                            setFlipped([]);
                            setIsProcessing(false);
                            
                            setPlayers(prev => {
                                const next = [...prev];
                                next[currentPlayer].score += 100;
                                return next;
                            });

                            setMatchInfo(cards[f].item);
                            setTimeout(() => setMatchInfo(null), 3500);

                            if (matched.length + 2 === cards.length) {
                                setTimeout(() => setView('END'), 1500);
                            }
                        }, 600);
                    } else {
                        setTimeout(() => {
                            setFlipped([]);
                            setIsProcessing(false);
                            setCurrentPlayer((currentPlayer + 1) % players.length);
                        }, 1200);
                    }
                }
            };

            return (
                <div className="w-full h-screen relative flex flex-col">
                    {view === 'INTRO' && (
                        <IntroScreen 
                            players={players} 
                            setPlayers={setPlayers} 
                            difficulty={difficulty} 
                            setDifficulty={setDifficulty} 
                            onStart={startGame}
                            loading={loading}
                        />
                    )}
                    {view === 'GAME' && (
                        <GameScreen 
                            cards={cards} 
                            flipped={flipped} 
                            matched={matched} 
                            players={players} 
                            currentPlayer={currentPlayer} 
                            onCardClick={handleCardClick}
                            onExit={() => setView('INTRO')}
                            matchInfo={matchInfo}
                        />
                    )}
                    {view === 'END' && (
                        <EndScreen 
                            players={players} 
                            onRestart={() => setView('INTRO')} 
                        />
                    )}
                </div>
            );
        };

        const IntroScreen = ({ players, setPlayers, difficulty, setDifficulty, onStart, loading }) => {
            const addPlayer = () => players.length < 4 && setPlayers([...players, { id: Date.now(), name: '', score: 0 }]);
            const removePlayer = (id) => players.length > 1 && setPlayers(players.filter(p => p.id !== id));
            const updatePlayer = (id, name) => setPlayers(players.map(p => p.id === id ? { ...p, name } : p));

            return (
                <div className="flex-1 flex items-center justify-center p-6">
                    <div className="glass-panel w-full max-w-3xl rounded-[2.5rem] overflow-hidden relative">
                        <div className="hazard-stripes h-6 w-full"></div>
                        <div className="p-10 md:p-16">
                            <div className="flex flex-col md:flex-row items-center gap-8 mb-12">
                                <div className="w-24 h-24 bg-safety-orange rounded-3xl flex items-center justify-center shadow-[0_0_40px_rgba(255,107,0,0.3)] animate-pulse">
                                    <Icon name="brain-circuit" size={48} className="text-white" />
                                </div>
                                <div className="text-center md:text-left">
                                    <h1 className="font-display text-5xl md:text-6xl font-black tracking-tighter text-white uppercase leading-none">
                                        MEMORY<br/><span className="text-safety-orange">PREVENTIVO</span>
                                    </h1>
                                    <p className="text-xs font-mono text-safety-orange tracking-[0.4em] uppercase mt-2">ISO 45001 / 7010 Training System</p>
                                </div>
                            </div>

                            <div className="grid md:grid-cols-2 gap-12">
                                <div className="space-y-6">
                                    <div className="flex justify-between items-center">
                                        <h3 className="text-[10px] font-black uppercase tracking-[0.2em] text-white/40">Operadores Activos</h3>
                                        <button onClick={addPlayer} className="text-[10px] font-black text-safety-orange hover:text-safety-yellow uppercase">+ Añadir</button>
                                    </div>
                                    <div className="space-y-3">
                                        {players.map((p, idx) => (
                                            <div key={p.id} className="flex gap-2 group">
                                                <input 
                                                    type="text" 
                                                    placeholder={`Operador ${idx + 1}`}
                                                    value={p.name}
                                                    onChange={(e) => updatePlayer(p.id, e.target.value)}
                                                    className="flex-1 bg-white/5 border border-white/10 rounded-2xl py-4 px-6 text-sm font-bold text-white focus:border-safety-orange transition-all outline-none"
                                                />
                                                {players.length > 1 && (
                                                    <button onClick={() => removePlayer(p.id)} className="p-4 text-white/20 hover:text-safety-red transition-colors">
                                                        <Icon name="x-circle" size={20} />
                                                    </button>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="space-y-6">
                                    <h3 className="text-[10px] font-black uppercase tracking-[0.2em] text-white/40">Nivel de Inspección</h3>
                                    <div className="grid grid-cols-3 gap-3">
                                        {[6, 12, 20].map(n => (
                                            <button 
                                                key={n}
                                                onClick={() => setDifficulty(n)}
                                                className={`py-6 rounded-2xl border-2 font-display font-black text-2xl transition-all ${difficulty === n ? 'bg-safety-orange border-safety-orange text-white' : 'bg-white/5 border-white/10 text-white/20 hover:border-white/20'}`}
                                            >
                                                {n}
                                            </button>
                                        ))}
                                    </div>
                                    <button 
                                        onClick={onStart}
                                        disabled={loading}
                                        className="w-full bg-safety-orange hover:bg-safety-yellow text-white hover:text-black py-6 rounded-2xl font-display font-black text-xl uppercase tracking-widest transition-all shadow-2xl disabled:opacity-50"
                                    >
                                        {loading ? 'Sincronizando...' : 'Iniciar Protocolo'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const GameScreen = ({ cards, flipped, matched, players, currentPlayer, onCardClick, onExit, matchInfo }) => {
            return (
                <div className="flex-1 flex flex-col">
                    {/* HUD */}
                    <div className="glass-panel border-b border-white/10 p-6 flex justify-between items-center relative z-20">
                        <div className="flex items-center gap-8">
                            <button onClick={onExit} className="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/10 transition-colors">
                                <Icon name="arrow-left" />
                            </button>
                            <div>
                                <h2 className="text-sm font-black text-white uppercase tracking-widest">Misión de Seguridad</h2>
                                <p className="text-[10px] font-mono text-safety-orange uppercase">Operador: {players[currentPlayer].name}</p>
                            </div>
                        </div>

                        <div className="flex gap-4">
                            {players.map((p, idx) => (
                                <div key={p.id} className={`px-6 py-3 rounded-2xl border transition-all ${currentPlayer === idx ? 'bg-safety-orange/20 border-safety-orange' : 'bg-white/5 border-white/10 opacity-40'}`}>
                                    <p className="text-[8px] font-black uppercase text-white/40 mb-1">{p.name || '---'}</p>
                                    <p className="text-xl font-display font-black text-white">{p.score}</p>
                                </div>
                            ))}
                        </div>

                        <div className="flex items-center gap-4">
                            <div className="text-right">
                                <p className="text-[8px] font-black text-white/40 uppercase">Progreso</p>
                                <p className="text-xl font-display font-black text-safety-orange">{Math.round((matched.length / cards.length) * 100)}%</p>
                            </div>
                            <div className="w-1 h-12 bg-white/10 rounded-full overflow-hidden">
                                <div className="w-full bg-safety-orange transition-all duration-500" style={{ height: `${(matched.length / cards.length) * 100}%` }}></div>
                            </div>
                        </div>
                    </div>

                    {/* Grid */}
                    <div className="flex-1 overflow-y-auto p-8 custom-scrollbar">
                        <div className={`grid gap-6 mx-auto max-w-7xl ${
                            cards.length <= 12 ? 'grid-cols-2 md:grid-cols-4' : 
                            cards.length <= 24 ? 'grid-cols-3 md:grid-cols-6' : 
                            'grid-cols-4 md:grid-cols-8'
                        }`}>
                            {cards.map((card, idx) => (
                                <div 
                                    key={card.id} 
                                    className={`card-perspective aspect-[3/4] cursor-pointer group ${flipped.includes(idx) || matched.includes(idx) ? 'card-flipped' : ''}`}
                                    onClick={() => onCardClick(idx)}
                                >
                                    <div className={`card-inner ${matched.includes(idx) ? 'matched-card' : ''}`}>
                                        {/* Front */}
                                        <div className="card-face bg-safety-gray flex items-center justify-center group-hover:border-safety-orange/30 transition-colors">
                                            <div className="absolute inset-3 border border-white/5 rounded-[14px]"></div>
                                            <Icon name="shield-check" size={40} className="text-white/5 group-hover:text-safety-orange/10 transition-colors" />
                                        </div>
                                        {/* Back */}
                                        <div 
                                            className="card-face card-back bg-white flex flex-col p-4"
                                            style={card.type === 'visual' ? { backgroundColor: card.item.color } : { backgroundColor: '#ffffff' }}
                                        >
                                            <div className="flex-1 flex items-center justify-center text-center">
                                                {card.type === 'visual' ? (
                                                    <span className="text-7xl drop-shadow-xl">{card.content}</span>
                                                ) : (
                                                    <div className="space-y-2">
                                                        <p className="text-safety-black font-display font-black text-sm uppercase leading-tight tracking-tighter">
                                                            {card.content}
                                                        </p>
                                                        <p className="text-[8px] font-mono font-bold text-safety-black/40 bg-safety-black/5 py-1 px-2 rounded-full">
                                                            {card.item.norma}
                                                        </p>
                                                    </div>
                                                )}
                                            </div>
                                            <div className="mt-auto pt-3 border-t border-black/5">
                                                <p className="text-[7px] font-black uppercase tracking-[0.2em] text-center text-black/30">
                                                    {card.type === 'visual' ? 'Identificador' : 'Normativa'}
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="h-32"></div>
                    </div>

                    {/* Match Info Overlay */}
                    {matchInfo && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-50 w-full max-w-2xl px-6 pointer-events-none">
                            <div className="glass-panel p-8 rounded-[2.5rem] border-2 border-safety-green shadow-[0_0_60px_rgba(0,138,68,0.3)] flex items-center gap-8 animate-in slide-in-from-bottom-10 duration-500 pointer-events-auto">
                                <div 
                                    className="w-28 h-28 rounded-3xl flex items-center justify-center text-6xl shadow-inner flex-shrink-0"
                                    style={{ backgroundColor: matchInfo.color }}
                                >
                                    {matchInfo.emoji}
                                </div>
                                <div className="space-y-2">
                                    <div className="flex items-center gap-2">
                                        <div className="px-2 py-0.5 bg-safety-green text-white text-[8px] font-black uppercase rounded-full">Validado</div>
                                        <span className="text-[10px] font-mono text-white/40 uppercase">{matchInfo.norma}</span>
                                    </div>
                                    <h4 className="text-2xl font-display font-black text-white uppercase tracking-tighter leading-none">{matchInfo.descripcion}</h4>
                                    <p className="text-xs text-slate-400 leading-relaxed font-medium italic">
                                        {matchInfo.desc_larga}
                                    </p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const EndScreen = ({ players, onRestart }) => {
            useEffect(() => {
                confetti({
                    particleCount: 200,
                    spread: 80,
                    origin: { y: 0.6 },
                    colors: ['#FF6B00', '#FFD700', '#008A44', '#D71920']
                });
            }, []);

            const winners = [...players].sort((a, b) => b.score - a.score);

            return (
                <div className="flex-1 flex items-center justify-center p-6">
                    <div className="glass-panel w-full max-w-2xl rounded-[3rem] overflow-hidden relative">
                        <div className="hazard-stripes h-6 w-full"></div>
                        <div className="p-12 text-center">
                            <div className="w-24 h-24 bg-safety-green/20 rounded-full flex items-center justify-center mx-auto mb-8 border-2 border-safety-green/30">
                                <Icon name="award" size={48} className="text-safety-green" />
                            </div>
                            <h1 className="font-display text-5xl font-black text-white uppercase tracking-tighter mb-2">Auditoría Finalizada</h1>
                            <p className="text-sm font-mono text-white/40 uppercase tracking-[0.4em] mb-12">Reporte de Competencias EHS</p>

                            <div className="space-y-4 mb-12">
                                {winners.map((p, idx) => (
                                    <div key={p.id} className={`flex items-center justify-between p-8 rounded-3xl border-2 transition-all ${idx === 0 ? 'bg-safety-green/10 border-safety-green scale-105' : 'bg-white/5 border-white/10 opacity-60'}`}>
                                        <div className="flex items-center gap-6">
                                            <span className={`text-3xl font-display font-black ${idx === 0 ? 'text-safety-green' : 'text-white/20'}`}>0{idx + 1}</span>
                                            <div className="text-left">
                                                <p className="text-[10px] font-black text-white/40 uppercase mb-1">Operador</p>
                                                <p className="text-2xl font-display font-black text-white uppercase">{p.name || 'Anónimo'}</p>
                                            </div>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-[10px] font-black text-white/40 uppercase mb-1">Puntaje</p>
                                            <p className="text-3xl font-display font-black text-white">{p.score}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <button onClick={onRestart} className="w-full bg-safety-green hover:bg-white hover:text-black py-6 rounded-2xl font-display font-black text-xl uppercase tracking-widest transition-all shadow-2xl">
                                Nueva Jornada
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        /* --- SECCIÓN DE ADICIÓN: VERSIÓN 3.2.0 (EMOJI VS DESC LARGA) --- */
        /* Esta sección añade la nueva lógica solicitada sin borrar la anterior, cumpliendo el protocolo de Blindaje. */

        const GameScreenV2 = ({ cards, flipped, matched, players, currentPlayer, onCardClick, onExit, matchInfo }) => {
            return (
                <div className="flex-1 flex flex-col">
                    {/* HUD */}
                    <div className="glass-panel border-b border-white/10 p-6 flex justify-between items-center relative z-20">
                        <div className="flex items-center gap-8">
                            <button onClick={onExit} className="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/10 transition-colors">
                                <Icon name="arrow-left" />
                            </button>
                            <div>
                                <h2 className="text-sm font-black text-white uppercase tracking-widest">Misión de Seguridad v3.2</h2>
                                <p className="text-[10px] font-mono text-safety-orange uppercase">Operador: {players[currentPlayer].name}</p>
                            </div>
                        </div>

                        <div className="flex gap-4">
                            {players.map((p, idx) => (
                                <div key={p.id} className={`px-6 py-3 rounded-2xl border transition-all ${currentPlayer === idx ? 'bg-safety-orange/20 border-safety-orange' : 'bg-white/5 border-white/10 opacity-40'}`}>
                                    <p className="text-[8px] font-black uppercase text-white/40 mb-1">{p.name || '---'}</p>
                                    <p className="text-xl font-display font-black text-white">{p.score}</p>
                                </div>
                            ))}
                        </div>

                        <div className="flex items-center gap-4">
                            <div className="text-right">
                                <p className="text-[8px] font-black text-white/40 uppercase">Progreso</p>
                                <p className="text-xl font-display font-black text-safety-orange">{Math.round((matched.length / cards.length) * 100)}%</p>
                            </div>
                            <div className="w-1 h-12 bg-white/10 rounded-full overflow-hidden">
                                <div className="w-full bg-safety-orange transition-all duration-500" style={{ height: `${(matched.length / cards.length) * 100}%` }}></div>
                            </div>
                        </div>
                    </div>

                    {/* Grid */}
                    <div className="flex-1 overflow-y-auto p-8 custom-scrollbar">
                        <div className={`grid gap-6 mx-auto max-w-7xl ${
                            cards.length <= 12 ? 'grid-cols-2 md:grid-cols-4' : 
                            cards.length <= 24 ? 'grid-cols-3 md:grid-cols-6' : 
                            'grid-cols-4 md:grid-cols-8'
                        }`}>
                            {cards.map((card, idx) => (
                                <div 
                                    key={card.id} 
                                    className={`card-perspective aspect-[3/4] cursor-pointer group ${flipped.includes(idx) || matched.includes(idx) ? 'card-flipped' : ''}`}
                                    onClick={() => onCardClick(idx)}
                                >
                                    <div className={`card-inner ${matched.includes(idx) ? 'matched-card' : ''}`}>
                                        {/* Front */}
                                        <div className="card-face bg-safety-gray flex items-center justify-center group-hover:border-safety-orange/30 transition-colors">
                                            <div className="absolute inset-3 border border-white/5 rounded-[14px]"></div>
                                            <Icon name="shield-check" size={40} className="text-white/5 group-hover:text-safety-orange/10 transition-colors" />
                                        </div>
                                        {/* Back */}
                                        <div 
                                            className="card-face card-back bg-white flex flex-col p-4"
                                            style={card.type === 'visual' ? { backgroundColor: card.item.color } : { backgroundColor: '#ffffff' }}
                                        >
                                            <div className="flex-1 flex items-center justify-center text-center overflow-hidden">
                                                {card.type === 'visual' ? (
                                                    <span className="text-7xl drop-shadow-xl">{card.content}</span>
                                                ) : (
                                                    <div className="h-full flex flex-col justify-center">
                                                        <p className="text-safety-black font-sans font-bold text-[9px] leading-tight text-center">
                                                            {card.content}
                                                        </p>
                                                    </div>
                                                )}
                                            </div>
                                            <div className="mt-auto pt-3 border-t border-black/5">
                                                <p className="text-[7px] font-black uppercase tracking-[0.2em] text-center text-black/30">
                                                    {card.type === 'visual' ? 'Símbolo' : 'Descripción Técnica'}
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="h-32"></div>
                    </div>

                    {/* Match Info Overlay */}
                    {matchInfo && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-50 w-full max-w-2xl px-6 pointer-events-none">
                            <div className="glass-panel p-8 rounded-[2.5rem] border-2 border-safety-green shadow-[0_0_60px_rgba(0,138,68,0.3)] flex items-center gap-8 animate-in slide-in-from-bottom-10 duration-500 pointer-events-auto">
                                <div 
                                    className="w-28 h-28 rounded-3xl flex items-center justify-center text-6xl shadow-inner flex-shrink-0"
                                    style={{ backgroundColor: matchInfo.color }}
                                >
                                    {matchInfo.emoji}
                                </div>
                                <div className="space-y-2">
                                    <div className="flex items-center gap-2">
                                        <div className="px-2 py-0.5 bg-safety-green text-white text-[8px] font-black uppercase rounded-full">Validado</div>
                                    </div>
                                    <h4 className="text-2xl font-display font-black text-white uppercase tracking-tighter leading-none">{matchInfo.descripcion}</h4>
                                    <p className="text-xs text-slate-400 leading-relaxed font-medium italic">
                                        {matchInfo.desc_larga}
                                    </p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const AppV2 = () => {
            const [view, setView] = useState('INTRO');
            const [players, setPlayers] = useState([{ id: 1, name: '', score: 0 }]);
            const [difficulty, setDifficulty] = useState(6);
            const [cards, setCards] = useState([]);
            const [flipped, setFlipped] = useState([]);
            const [matched, setMatched] = useState([]);
            const [currentPlayer, setCurrentPlayer] = useState(0);
            const [isProcessing, setIsProcessing] = useState(false);
            const [gameData, setGameData] = useState([]);
            const [matchInfo, setMatchInfo] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const fetchData = async () => {
                    try {
                        const response = await fetch(SHEETS_URL);
                        const csvText = await response.text();
                        const rows = csvText.split('\n').slice(1);
                        
                        const parsed = rows.map(row => {
                            const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/^"|"$/g, ''));
                            return {
                                emoji: cols[0],
                                descripcion: cols[1],
                                tipo: cols[2],
                                color: cols[3],
                                norma: cols[4],
                                desc_larga: cols[5]
                            };
                        }).filter(item => item.emoji && item.desc_larga);

                        setGameData(parsed);
                        setLoading(false);
                    } catch (error) {
                        console.error("Error loading sheets:", error);
                        setLoading(false);
                    }
                };
                fetchData();
            }, []);

            const startGameV2 = () => {
                const validPlayers = players.filter(p => p.name.trim() !== '');
                if (validPlayers.length === 0) {
                    alert("Ingrese al menos un operador.");
                    return;
                }
                
                setPlayers(validPlayers.map(p => ({ ...p, score: 0 })));
                setCurrentPlayer(0);
                
                const selected = [...gameData].sort(() => Math.random() - 0.5).slice(0, difficulty);
                const deck = [];
                
                selected.forEach((item, idx) => {
                    // Carta 1: Emoji
                    deck.push({
                        id: `v-${idx}`,
                        pairId: idx,
                        type: 'visual',
                        content: item.emoji,
                        item: item
                    });
                    // Carta 2: Descripción LARGA (Nueva lógica solicitada)
                    deck.push({
                        id: `t-${idx}`,
                        pairId: idx,
                        type: 'text',
                        content: item.desc_larga,
                        item: item
                    });
                });

                setCards(deck.sort(() => Math.random() - 0.5));
                setMatched([]);
                setFlipped([]);
                setView('GAME');
            };

            const handleCardClick = (idx) => {
                if (isProcessing || flipped.includes(idx) || matched.includes(idx)) return;

                const newFlipped = [...flipped, idx];
                setFlipped(newFlipped);

                if (newFlipped.length === 2) {
                    setIsProcessing(true);
                    const [f, s] = newFlipped;
                    
                    if (cards[f].pairId === cards[s].pairId) {
                        setTimeout(() => {
                            setMatched(prev => [...prev, f, s]);
                            setFlipped([]);
                            setIsProcessing(false);
                            
                            setPlayers(prev => {
                                const next = [...prev];
                                next[currentPlayer].score += 100;
                                return next;
                            });

                            setMatchInfo(cards[f].item);
                            setTimeout(() => setMatchInfo(null), 4000);

                            if (matched.length + 2 === cards.length) {
                                setTimeout(() => setView('END'), 1500);
                            }
                        }, 600);
                    } else {
                        setTimeout(() => {
                            setFlipped([]);
                            setIsProcessing(false);
                            setCurrentPlayer((currentPlayer + 1) % players.length);
                        }, 1200);
                    }
                }
            };

            return (
                <div className="w-full h-screen relative flex flex-col">
                    {view === 'INTRO' && (
                        <IntroScreen 
                            players={players} 
                            setPlayers={setPlayers} 
                            difficulty={difficulty} 
                            setDifficulty={setDifficulty} 
                            onStart={startGameV2}
                            loading={loading}
                        />
                    )}
                    {view === 'GAME' && (
                        <GameScreenV2 
                            cards={cards} 
                            flipped={flipped} 
                            matched={matched} 
                            players={players} 
                            currentPlayer={currentPlayer} 
                            onCardClick={handleCardClick}
                            onExit={() => setView('INTRO')}
                            matchInfo={matchInfo}
                        />
                    )}
                    {view === 'END' && (
                        <EndScreen 
                            players={players} 
                            onRestart={() => setView('INTRO')} 
                        />
                    )}
                </div>
            );
        };

        // Renderizamos la nueva versión AppV2
        const rootV2 = ReactDOM.createRoot(document.getElementById('root'));
        rootV2.render(<AppV2 />);
    </script>
</body>
</html>
