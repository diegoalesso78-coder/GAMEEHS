<!DOCTYPE html>
<html lang='es'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>TRUCO SEGURO — PrevenEHS</title>
  <script src='https://unpkg.com/react@18/umd/react.development.js'></script>
  <script src='https://unpkg.com/react-dom@18/umd/react-dom.development.js'></script>
  <script src='https://unpkg.com/@babel/standalone/babel.min.js'></script>
  <script src='https://cdn.tailwindcss.com'></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary-container': '#0f1a14',
            'on-primary-fixed': '#131e18',
            'secondary': '#ffb690',
            'secondary-container': '#ec6a06',
            'tertiary': '#f7be1d',
            'card-white': '#fdfbf7',
            'error-rose': '#ffb4ab',
            'error-dark': '#93000a',
          },
          fontFamily: {
            headline: ["Space Grotesk", "sans-serif"],
            body: ["Inter", "sans-serif"],
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #0f1a14;
      background-image: radial-gradient(circle at center, #1a2e23 0%, #0f1a14 100%);
      color: #e4e2de;
      overflow: hidden;
      height: 100vh;
      font-family: 'Inter', sans-serif;
    }
    .block-shadow { box-shadow: 6px 6px 0px 0px #131e18; }
    .glass-hud {
      background: rgba(15, 26, 20, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>
  <div id='root'></div>
  <script type='text/babel'>
    const { useState, useEffect } = React;

    const DECK_BASE = [
      { id: 1, n: 1, s: 'Espadas', p: 14, l: 'Paro y\nPido Ayuda', e: '🛑' },
      { id: 2, n: 1, s: 'Bastos', p: 13, l: 'Reporto Cond.\nInseguras', e: '📢' },
      { id: 3, n: 7, s: 'Espadas', p: 12, l: 'Equipamiento\nSeguro', e: '🚧' },
      { id: 4, n: 7, s: 'Oros', p: 11, l: 'Equipamiento\nSeguro', e: '🚧' },
      { id: 5, n: 3, s: 'Espadas', p: 10, l: 'Cumplo\nEstándares', e: '📋' },
      { id: 6, n: 3, s: 'Bastos', p: 10, l: 'Cumplo\nEstándares', e: '📋' },
      { id: 7, n: 3, s: 'Oros', p: 10, l: 'Cumplo\nEstándares', e: '📋' },
      { id: 8, n: 3, s: 'Copas', p: 10, l: 'Cumplo\nEstándares', e: '📋' },
      { id: 9, n: 2, s: 'Espadas', p: 9, l: 'Uso Correcto\nde EPP', e: '🦺' },
      { id: 10, n: 2, s: 'Bastos', p: 9, l: 'Uso Correcto\nde EPP', e: '🦺' },
      { id: 11, n: 2, s: 'Oros', p: 9, l: 'Uso Correcto\nde EPP', e: '🦺' },
      { id: 12, n: 2, s: 'Copas', p: 9, l: 'Uso Correcto\nde EPP', e: '🦺' },
      { id: 13, n: 1, s: 'Copas', p: 8, l: 'Gemba y\nAuditorías', e: '🔍' },
      { id: 14, n: 1, s: 'Oros', p: 8, l: 'Gemba y\nAuditorías', e: '🔍' },
      { id: 15, n: 12, s: 'Espadas', p: 7, l: 'Estándares\na Medias', e: '⚠️' },
      { id: 16, n: 12, s: 'Bastos', p: 7, l: 'Estándares\na Medias', e: '⚠️' },
      { id: 17, n: 12, s: 'Oros', p: 7, l: 'Estándares\na Medias', e: '⚠️' },
      { id: 18, n: 12, s: 'Copas', p: 7, l: 'Estándares\na Medias', e: '⚠️' },
      { id: 19, n: 11, s: 'Espadas', p: 6, l: 'Estándares\na Medias', e: '⚠️' },
      { id: 20, n: 11, s: 'Bastos', p: 6, l: 'Estándares\na Medias', e: '⚠️' },
      { id: 21, n: 11, s: 'Oros', p: 6, l: 'Estándares\na Medias', e: '⚠️' },
      { id: 22, n: 11, s: 'Copas', p: 6, l: 'Estándares\na Medias', e: '⚠️' },
      { id: 23, n: 10, s: 'Espadas', p: 5, l: 'Estándares\na Medias', e: '⚠️' },
      { id: 24, n: 10, s: 'Bastos', p: 5, l: 'Estándares\na Medias', e: '⚠️' },
      { id: 25, n: 10, s: 'Oros', p: 5, l: 'Estándares\na Medias', e: '⚠️' },
      { id: 26, n: 10, s: 'Copas', p: 5, l: 'Estándares\na Medias', e: '⚠️' },
      { id: 27, n: 7, s: 'Copas', p: 4, l: 'Estándares\na Medias', e: '⚠️' },
      { id: 28, n: 7, s: 'Bastos', p: 4, l: 'Estándares\na Medias', e: '⚠️' },
      { id: 29, n: 6, s: 'Espadas', p: 3, l: 'Acto\nInseguro', e: '❌' },
      { id: 30, n: 6, s: 'Bastos', p: 3, l: 'Acto\nInseguro', e: '❌' },
      { id: 31, n: 6, s: 'Oros', p: 3, l: 'Acto\nInseguro', e: '❌' },
      { id: 32, n: 6, s: 'Copas', p: 3, l: 'Acto\nInseguro', e: '❌' },
      { id: 33, n: 5, s: 'Espadas', p: 2, l: 'Acto\nInseguro', e: '❌' },
      { id: 34, n: 5, s: 'Bastos', p: 2, l: 'Acto\nInseguro', e: '❌' },
      { id: 35, n: 5, s: 'Oros', p: 2, l: 'Acto\nInseguro', e: '❌' },
      { id: 36, n: 5, s: 'Copas', p: 2, l: 'Acto\nInseguro', e: '❌' },
      { id: 37, n: 4, s: 'Espadas', p: 1, l: 'Acto\nInseguro', e: '❌' },
      { id: 38, n: 4, s: 'Bastos', p: 1, l: 'Acto\nInseguro', e: '❌' },
      { id: 39, n: 4, s: 'Oros', p: 1, l: 'Acto\nInseguro', e: '❌' },
      { id: 40, n: 4, s: 'Copas', p: 1, l: 'Acto\nInseguro', e: '❌' },
    ];

    const shuffle = (array) => {
      let m = array.length, t, i;
      while (m) {
        i = Math.floor(Math.random() * m--);
        t = array[m];
        array[m] = array[i];
        array[i] = t;
      }
      return array;
    };

    const Card = ({ card, hidden, onClick, styleClass = "" }) => {
      if (!card && !hidden) return <div className="w-24 h-36 border-2 border-dashed border-white/10 rounded-lg"></div>;
      return (
        <div 
          onClick={onClick}
          className={`relative w-24 h-36 bg-[#fdfbf7] rounded-lg block-shadow border-2 border-[#131e18] cursor-pointer transition-all ${styleClass} ${hidden ? 'bg-[#131e18]' : ''}`}
        >
          {!hidden ? (
            <React.Fragment>
              <div className="absolute inset-[6px] border border-[#131e18] pointer-events-none"></div>
              <div className="absolute top-2 left-2 flex items-center gap-1 text-[#131e18] font-black text-xs">
                <span>{card.n}</span>
                <span>{card.s[0]}</span>
              </div>
              <div className="absolute bottom-2 right-2 flex items-center gap-1 text-[#131e18] font-black text-xs rotate-180">
                <span>{card.n}</span>
                <span>{card.s[0]}</span>
              </div>
              <div className="absolute inset-0 flex flex-col items-center justify-center p-4 text-center">
                <div className="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-inner mb-1">
                  <span className="text-xl">{card.e}</span>
                </div>
                <span className="text-[7px] font-black text-[#131e18] leading-tight whitespace-pre-line uppercase">
                  {card.l}
                </span>
              </div>
            </React.Fragment>
          ) : (
            <div className="absolute inset-0 flex items-center justify-center">
              <span className="text-white/10 text-2xl font-black">?</span>
            </div>
          )}
        </div>
      );
    };

    const App = () => {
      const [view, setView] = useState('START');
      const [playerScore, setPlayerScore] = useState(0);
      const [botScore, setBotScore] = useState(0);
      const [playerHand, setPlayerHand] = useState([]);
      const [botHand, setBotHand] = useState([]);
      const [table, setTable] = useState({ player: null, bot: null });
      const [message, setMessage] = useState("Iniciando Operación...");
      const [gameStatus, setGameStatus] = useState('dealing'); 
      const [trucoActive, setTrucoActive] = useState(false);
      const [rounds, setRounds] = useState([]);
      const [handPoints, setHandPoints] = useState(1);

      useEffect(() => {
        if (view === 'GAME' && gameStatus === 'dealing') startNewHand();
      }, [view, gameStatus]);

      const startNewHand = () => {
        const deck = shuffle([...DECK_BASE]);
        setPlayerHand(deck.slice(0, 3));
        setBotHand(deck.slice(3, 6));
        setTable({ player: null, bot: null });
        setRounds([]);
        setTrucoActive(false);
        setHandPoints(1);
        setMessage("Tu turno, Operador. Evaluá la conducta.");
        setGameStatus('playerTurn');
      };

      const handleIntervenir = () => {
        if (gameStatus !== 'playerTurn') return;
        setMessage("Solicitando Intervención...");
        setTimeout(() => {
          const botBestPower = Math.max(...botHand.map(c => c.p));
          const accepts = botBestPower >= 8 || Math.random() > 0.5;
          if (accepts) {
            setTrucoActive(true);
            setHandPoints(2);
            setMessage("¡El Riesgo acepta el desafío! Vale 2 puntos.");
          } else {
            setMessage("El Riesgo evadió la intervención. Ganás la mano.");
            resolveHand('player', 1);
          }
        }, 1000);
      };

      const handleDetener = () => {
        setMessage("Operación Detenida. Te vas al mazo.");
        resolveHand('bot', trucoActive ? 2 : 1);
      };

      const playCard = (i) => {
        if (gameStatus !== 'playerTurn') return;
        const card = playerHand[i];
        const newHand = [...playerHand];
        newHand.splice(i, 1);
        setPlayerHand(newHand);
        setTable(prev => ({ ...prev, player: card }));
        setMessage(`Activaste: ${card.l.replace('\n', ' ')}`);
        setGameStatus('botTurn');
        setTimeout(() => {
          let chosen;
          const winners = botHand.filter(c => c.p > card.p).sort((a, b) => a.p - b.p);
          chosen = winners.length > 0 ? winners[0] : [...botHand].sort((a, b) => a.p - b.p)[0];
          const bIdx = botHand.findIndex(c => c.id === chosen.id);
          const newBot = [...botHand];
          newBot.splice(bIdx, 1);
          setBotHand(newBot);
          setTable(prev => ({ ...prev, bot: chosen }));
          setMessage(`El Riesgo responde con: ${chosen.l.replace('\n', ' ')}`);
          setGameStatus('resolution');
          setTimeout(() => resolveRound(card, chosen), 1500);
        }, 1500);
      };

      const resolveRound = (p, b) => {
        let w = p.p > b.p ? 'player' : b.p > p.p ? 'bot' : 'tie';
        const newR = [...rounds, w];
        setRounds(newR);
        if (w === 'player') setMessage("¡Punto para Seguridad!");
        else if (w === 'bot') setMessage("El Riesgo gana esta vuelta.");
        else setMessage("¡Parda! Empate técnico.");
        const pW = newR.filter(r => r === 'player').length;
        const bW = newR.filter(r => r === 'bot').length;
        setTimeout(() => {
          if (pW === 2 || (pW === 1 && newR.includes('tie') && newR[0] === 'player')) resolveHand('player', handPoints);
          else if (bW === 2 || (bW === 1 && newR.includes('tie') && newR[0] === 'bot')) resolveHand('bot', handPoints);
          else if (newR.length === 3) {
            if (pW > bW) resolveHand('player', handPoints);
            else if (bW > pW) resolveHand('bot', handPoints);
            else { setMessage("Mano empatada."); setTimeout(() => setGameStatus('dealing'), 2000); }
          } else {
            setTable({ player: null, bot: null });
            setGameStatus('playerTurn');
            setMessage("Siguiente vuelta...");
          }
        }, 1500);
      };

      const resolveHand = (w, pts) => {
        if (w === 'player') {
          setPlayerScore(s => {
            const n = s + pts;
            setMessage(`¡Misión Cumplida! Sumás ${pts} puntos.`);
            if (n >= 15) setGameStatus('gameOver');
            else setTimeout(() => setGameStatus('dealing'), 2500);
            return n;
          });
        } else {
          setBotScore(s => {
            const n = s + pts;
            setMessage(`Accidente Ocurrido. El Riesgo suma ${pts} puntos.`);
            if (n >= 15) setGameStatus('gameOver');
            else setTimeout(() => setGameStatus('dealing'), 2500);
            return n;
          });
        }
      };

      if (view === 'START') {
        return (
          <div className="flex flex-col items-center justify-center h-screen bg-[#0f1a14] relative overflow-hidden">
            <div className="absolute inset-0 opacity-10" style={{backgroundImage: 'radial-gradient(#1a2e23 1px, transparent 1px)', backgroundSize: '20px 20px'}}></div>
            <div className="z-10 text-center">
              <div className="mb-8 inline-block p-4 bg-black/40 rounded-full border-2 border-[#ffb690] animate-pulse">
                <span className="text-4xl">🛑</span>
              </div>
              <h1 className="text-6xl font-black text-white tracking-tighter mb-2">TRUCO <span className="text-[#ffb690]">SEGURO</span></h1>
              <p className="text-lg font-headline text-[#c3c8c2] tracking-widest uppercase mb-12">El Desafío de la Conducta</p>
              <button 
                onClick={() => setView('GAME')}
                className="bg-[#ec6a06] text-white font-black px-12 py-5 rounded-sm block-shadow active:translate-y-1 transition-all uppercase text-xl tracking-widest"
              >
                Iniciar Operación
              </button>
            </div>
          </div>
        );
      }

      if (gameStatus === 'gameOver') {
        return (
          <div className="flex flex-col items-center justify-center h-screen bg-[#0f1a14] text-white p-8 text-center">
            <div className="glass-hud p-12 rounded-2xl border-2 border-[#ffb690] shadow-2xl">
              <h1 className="text-5xl font-black mb-4 tracking-tighter">{playerScore >= 15 ? "¡SEGURIDAD TOTAL!" : "PLANTA BLOQUEADA"}</h1>
              <p className="text-lg mb-8 text-[#c3c8c2]">{playerScore >= 15 ? "Has mitigado todos los riesgos." : "El riesgo ha superado los protocolos."}</p>
              <div className="flex gap-8 justify-center mb-12">
                <div className="text-center">
                  <p className="text-[10px] uppercase tracking-widest opacity-50">Tu Score</p>
                  <p className="text-5xl font-black text-[#ffb690]">{playerScore}</p>
                </div>
                <div className="text-center">
                  <p className="text-[10px] uppercase tracking-widest opacity-50">Riesgo</p>
                  <p className="text-5xl font-black text-[#ffb4ab]">{botScore}</p>
                </div>
              </div>
              <button onClick={() => window.location.reload()} className="bg-[#ec6a06] text-white font-black px-12 py-4 rounded-sm block-shadow active:translate-y-1 transition-all uppercase tracking-widest">Reiniciar Turno</button>
            </div>
          </div>
        );
      }

      return (
        <div className="flex flex-col h-screen max-w-4xl mx-auto relative px-4" style={{backgroundImage: 'radial-gradient(#1a2e23 1px, transparent 1px)', backgroundSize: '20px 20px'}}>
          <header className="flex justify-between items-start pt-8 z-10">
            <div className="flex-1 bg-black/40 border-l-4 border-emerald-500 p-4 shadow-inner">
              <p className="font-headline text-[10px] uppercase tracking-[0.2em] text-emerald-400">Tú (Seguridad)</p>
              <span className="text-4xl font-black text-emerald-400">{playerScore}</span>
            </div>
            <div className="px-4 self-center opacity-20"><div className="w-[1px] h-16 bg-white"></div></div>
            <div className="flex-1 bg-black/40 border-r-4 border-red-400 p-4 shadow-inner text-right">
              <p className="font-headline text-[10px] uppercase tracking-[0.2em] text-red-400">El Riesgo</p>
              <span className="text-4xl font-black text-red-400">{botScore}</span>
            </div>
          </header>
          <main className="flex-1 flex flex-col items-center justify-center gap-6 relative">
            <div className="flex gap-2 opacity-40 scale-75">
              {botHand.map((_, i) => <Card key={i} hidden />)}
            </div>
            <div className="w-full max-w-lg">
              <div className="glass-hud rounded-xl py-6 px-6 text-center shadow-2xl border-t border-white/10">
                <p className="text-[#ffb690] text-[10px] tracking-[0.4em] uppercase mb-2 font-black">Estado del Proceso</p>
                <h2 className="font-headline text-xl md:text-2xl font-black text-white tracking-tight leading-tight uppercase">{message}</h2>
                {trucoActive && <div className="mt-4 inline-block bg-[#ec6a06] text-white text-[10px] font-black px-3 py-1 rounded-full animate-pulse">TRUCO ACTIVO</div>}
              </div>
            </div>
            <div className="flex gap-8 h-40 items-center">
              <Card card={table.player} styleClass="scale-110" />
              <Card card={table.bot} styleClass="scale-110" />
            </div>
            <div className="flex gap-4 mt-4">
              <button onClick={handleIntervenir} disabled={gameStatus !== 'playerTurn' || trucoActive} className="bg-[#ec6a06] text-white font-black px-8 py-3 rounded-sm border-b-4 border-[#131e18] active:translate-y-1 transition-all uppercase text-sm tracking-tighter disabled:opacity-30">Intervenir</button>
              <button onClick={handleDetener} disabled={gameStatus !== 'playerTurn'} className="bg-[#93000a] text-white font-black px-8 py-3 rounded-sm border-b-4 border-[#131e18] active:translate-y-1 transition-all uppercase text-sm tracking-tighter disabled:opacity-30">Detener</button>
            </div>
          </main>
          <footer className="bg-gradient-to-t from-black/80 to-transparent pt-12 pb-8 px-8 rounded-t-[3rem] border-t border-emerald-500/20">
            <div className="flex justify-center -space-x-4">
              {playerHand.map((c, i) => <Card key={c.id} card={c} onClick={() => playCard(i)} styleClass={gameStatus === 'playerTurn' ? 'hover:z-50' : 'opacity-50 grayscale'} />)}
            </div>
          </footer>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
